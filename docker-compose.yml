services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  db:
    image: postgres:16-alpine
    container_name: db
    env_file:
      - ./backend/.env
    ports:
      - "5433:5432"
    volumes:
      - osushenie_postgres_data:/var/lib/postgresql/data
volumes:
  osushenie_postgres_data: